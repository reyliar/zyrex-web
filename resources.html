<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyrex | Resources</title>
    <link rel="stylesheet" href="css/style.css?v=8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;color:#fff;font-family:Poppins,sans-serif}
        .rh{text-align:center;padding:110px 20px 0}
        .rh h1{font-size:2.4rem;font-weight:800;margin:0 0 8px;background:linear-gradient(135deg,#dc143c,#ff6b8a,#dc143c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .rh p{font-size:.9rem;color:#606070;margin:0 0 30px;max-width:480px;margin-left:auto;margin-right:auto}
        .sb{display:flex;gap:4px;max-width:600px;margin:0 auto 28px;padding:0 20px}
        .sc{flex:1;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:14px 10px;text-align:center;transition:all .3s}
        .sc:hover{background:rgba(220,20,60,.04);border-color:rgba(220,20,60,.1)}
        .sc .sn{font-size:1.4rem;font-weight:800;color:#fff;display:block}
        .sc .sl{font-size:.68rem;color:#606070;margin-top:2px;display:block;text-transform:uppercase;letter-spacing:.04em}
        .tb{display:flex;align-items:center;gap:10px;max-width:1160px;margin:0 auto 16px;padding:0 20px;flex-wrap:wrap}
        .search-wrap{position:relative;flex:1;min-width:200px}
        .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#606070;font-size:.75rem;pointer-events:none;z-index:1}
        .search-wrap input{width:100%;padding:10px 14px 10px 36px;background:#121216;border:1px solid rgba(255,255,255,.06);border-radius:8px;color:#fff;font-family:inherit;font-size:.82rem;outline:none;box-sizing:border-box;transition:border-color .2s}
        .search-wrap input:focus{border-color:#dc143c}
        .search-wrap input::placeholder{color:#505060}
        .st{display:flex;gap:2px;background:rgba(255,255,255,.025);border-radius:8px;padding:3px}
        .st button{padding:6px 14px;border:none;background:transparent;color:#606070;font-family:inherit;font-size:.78rem;cursor:pointer;border-radius:6px;transition:all .2s}
        .st button:hover{color:#fff}
        .st button.active{background:rgba(220,20,60,.12);color:#ff4d6d}
        .tb-r{display:flex;align-items:center;gap:8px}
        .tb-r select{padding:8px 12px;background:#121216;border:1px solid rgba(255,255,255,.06);border-radius:8px;color:#9090a0;font-family:inherit;font-size:.78rem;outline:none;cursor:pointer}
        .tb-r select:focus{border-color:#dc143c}
        .tb-v{display:flex;gap:2px;background:rgba(255,255,255,.025);border-radius:8px;padding:3px}
        .tb-v button{padding:6px 10px;border:none;background:transparent;color:#606070;cursor:pointer;border-radius:6px;transition:all .2s;font-size:.85rem}
        .tb-v button:hover,.tb-v button.active{color:#fff;background:rgba(255,255,255,.04)}
        .cp{display:flex;gap:6px;max-width:1160px;margin:0 auto 20px;padding:0 20px;flex-wrap:wrap}
        .cp button{padding:7px 16px;border:1px solid rgba(255,255,255,.06);background:transparent;color:#9090a0;font-family:inherit;font-size:.78rem;cursor:pointer;border-radius:20px;transition:all .2s;display:flex;align-items:center;gap:6px}
        .cp button:hover{border-color:rgba(220,20,60,.2);color:#fff}
        .cp button.active{background:rgba(220,20,60,.1);border-color:#dc143c;color:#ff4d6d}
        .cp .cnt{font-size:.6rem;padding:0 6px;border-radius:4px;background:rgba(255,255,255,.04);color:#505060;transition:all .2s}
        .cp button.active .cnt{background:rgba(220,20,60,.12);color:#ff4d6d}
        .ri{display:flex;align-items:center;justify-content:space-between;max-width:1160px;margin:0 auto 14px;padding:0 20px}
        .ri span{font-size:.78rem;color:#606070}
        .ri .rn{color:#9090a0}
        .rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;max-width:1160px;margin:0 auto;padding:0 20px 60px}
        .rc{background:#121216;border:1px solid rgba(255,255,255,.04);border-radius:10px;overflow:hidden;transition:all .3s ease;text-decoration:none;color:inherit;display:block}
        .rc:hover{transform:translateY(-4px);border-color:rgba(220,20,60,.15);box-shadow:0 8px 30px rgba(0,0,0,.3)}
        .rc-img{width:100%;aspect-ratio:16/10;position:relative;overflow:hidden}
        .rc-img .rimg{width:100%;height:100%;object-fit:cover;background:#1c1c24}
        .rc-img .rimg img{width:100%;height:100%;object-fit:cover;display:block}
        .roverlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.7));pointer-events:none}
        .rbadge{position:absolute;bottom:8px;left:8px;display:flex;gap:4px;flex-wrap:wrap}
        .rbadge span{padding:3px 8px;border-radius:4px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
        .tag-after-effects{background:rgba(153,51,255,.15);color:#9933ff}
        .tag-premiere-pro{background:rgba(82,132,255,.15);color:#5284ff}
        .tag-photoshop{background:rgba(49,178,255,.15);color:#31b2ff}
        .tag-video-star{background:rgba(255,51,102,.15);color:#ff3366}
        .tag-topaz-labs{background:rgba(0,200,100,.15);color:#00c864}
        .tag-others{background:rgba(255,180,0,.15);color:#ffb400}
        .tag-free{background:rgba(0,200,100,.12);color:#00c864}
        .rc-content{padding:12px 14px}
        .rc-title{font-size:.82rem;font-weight:700;margin:0 0 4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .rc-desc{font-size:.68rem;color:#606070;line-height:1.4;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .rc-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
        .rc-meta{display:flex;align-items:center;gap:5px;min-width:0}
        .rava-fb{width:20px;height:20px;border-radius:50%;background:#dc143c;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.5rem;flex-shrink:0}
        .rname{font-size:.68rem;color:#9090a0;font-weight:500}
        .rdate{font-size:.6rem;color:#505060}
        .rc-actions{display:flex;gap:8px;flex-shrink:0}
        .rc-actions span{font-size:.6rem;color:#505060;display:flex;align-items:center;gap:3px}
        .rc-actions span i{font-size:.55rem}
        .pgn{display:flex;justify-content:center;gap:4px;max-width:1160px;margin:0 auto;padding:0 20px 60px}
        .pgn button{padding:8px 14px;border:1px solid rgba(255,255,255,.06);background:transparent;color:#9090a0;font-family:inherit;font-size:.78rem;cursor:pointer;border-radius:6px;transition:all .2s}
        .pgn button:hover{border-color:rgba(220,20,60,.2);color:#fff}
        .pgn button.active{background:rgba(220,20,60,.1);border-color:#dc143c;color:#ff4d6d}
        @media(max-width:768px){
            .rh h1{font-size:1.6rem}
            .sb{gap:6px;flex-direction:column;max-width:300px}
            .tb{flex-direction:column;align-items:stretch}
            .tb-r{justify-content:space-between}
            .rg{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px 40px}
            .ri{padding:0 14px}
            .cp{padding:0 14px}
            .pgn{padding:0 14px 40px}
        }
        @media(max-width:480px){.rg{grid-template-columns:1fr;gap:10px}}
    </style>
</head>
<body>
    <nav class="navbar scrolled"><div class="container">
        <a href="index.html" class="logo"><img src="https://cdn.discordapp.com/attachments/1421433783717990570/1519453492572328039/content.png?ex=6a3d9cd6&is=6a3c4b56&hm=d923795bdb21d6d38a09fa9bdbf8584fef5b10c1eadc2ef7b2d6b71c52b46bc5&" alt="ZYREX" class="logo-img"><span class="logo-text">yrex</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="resources.html" class="active">Resources</a></li>
            <li><a href="more.html">Plugins</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <div id="authBtn"></div>
            <a href="https://discord.gg/fAydSzpafA" target="_blank" class="btn-discord"><i class="fab fa-discord"></i> <span>Join Us</span></a>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </div></nav>

    <section class="rh">
        <h1>Premium Editing Resources</h1>
        <p>Discover high-quality presets crafted for professional video editing.</p>
    </section>

    <div class="sb">
        <div class="sc"><span class="sn">0</span><span class="sl">Presets</span></div>
        <div class="sc"><span class="sn">86</span><span class="sl">Plugins</span></div>
        <div class="sc"><span class="sn">716</span><span class="sl">Downloads</span></div>
    </div>

    <div class="tb">
        <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="s" placeholder="Search presets..." oninput="gs()"></div>
        <div class="st" id="st">
            <button class="active" data-sort="recent">Recent</button>
            <button data-sort="name">Name</button>
        </div>
        <div class="tb-r">
            <select id="accessFilter">
                <option value="all">All</option>
                <option value="free">Free</option>
                <option value="premium">Premium</option>
            </select>
            <div class="tb-v">
                <button class="active" data-view="grid" title="Grid View"><i class="fas fa-th"></i></button>
                <button data-view="list" title="List View"><i class="fas fa-list"></i></button>
            </div>
        </div>
    </div>

    <div class="cp" id="cp">
        <button class="active" data-c="all">All <span class="cnt">0</span></button>
        <button data-c="after-effects"><i class="fas fa-film"></i> After Effects <span class="cnt">0</span></button>
        <button data-c="premiere-pro"><i class="fas fa-video"></i> Premiere Pro <span class="cnt">0</span></button>
        <button data-c="photoshop"><i class="fas fa-image"></i> Photoshop <span class="cnt">0</span></button>
        <button data-c="video-star"><i class="fas fa-star"></i> Video Star <span class="cnt">0</span></button>
        <button data-c="topaz-labs"><i class="fas fa-gem"></i> Topaz Labs <span class="cnt">0</span></button>
        <button data-c="others"><i class="fas fa-folder"></i> Others <span class="cnt">0</span></button>
    </div>

    <div class="ri">
        <span>Showing <strong class="rn" id="shownCount">0</strong> results</span>
        <span>Page <strong>1</strong> of <strong>1</strong></span>
    </div>

    <div class="rg" id="pg"></div>

    <div class="pgn">
        <button class="active">1</button>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/presets-data.js?v=2"></script>
    <script src="js/presets.js?v=2"></script>
</body>
</html>
