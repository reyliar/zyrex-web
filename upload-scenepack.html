<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Studio — Zyrex</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/style.css?v=18">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cherry: #e61536;
            --cherry-rgb: 230, 21, 54;
            --cherry-light: #ff4d6d;
            --cherry-dark: #8a0d22;
            --dark: #070203;
            --dark-panel: rgba(15, 4, 7, 0.7);
            --border: rgba(230, 21, 54, 0.1);
            --border-hover: rgba(230, 21, 54, 0.25);
            --text: #fcedf0;
            --muted: #8a6570;
            --muted-dark: #5c3f47;
            --radius-lg: 20px;
            --radius-md: 14px;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* === BG AURA === */
        .bg-aura { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .bg-aura .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: .07; }
        .orb-1 { width: 500px; height: 500px; background: var(--cherry); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: #5865F2; bottom: -5%; right: -5%; opacity: .04; }
        .orb-3 { width: 300px; height: 300px; background: var(--cherry-light); top: 50%; left: 30%; opacity: .03; }
        
        .grid-bg {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: linear-gradient(rgba(230, 21, 54, 0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(230, 21, 54, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at 50% 30%, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 40%, transparent 80%);
        }

        /* === DASHBOARD LAYOUT === */
        .studio-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* === SIDEBAR === */
        .studio-sidebar {
            width: 280px;
            background: rgba(5, 1, 2, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--border);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            height: 100vh;
            left: 0; top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .sidebar-brand img { height: 38px; }
        .sidebar-brand span {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.35rem;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #fff, var(--cherry-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 6px;
            list-style: none;
            flex: 1;
        }
        .menu-title {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin: 15px 0 8px 12px;
        }
        .menu-item a, .menu-item span.locked-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.86rem;
            font-weight: 600;
            color: var(--muted);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }
        .menu-item.active a {
            background: rgba(230, 21, 54, 0.08);
            color: #fff;
            box-shadow: inset 4px 0 0 var(--cherry-light);
        }
        .menu-item a:hover {
            background: rgba(230, 21, 54, 0.04);
            color: #fff;
        }
        .menu-item span.locked-item {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .menu-item i { font-size: 1rem; width: 22px; }
        .menu-item .lock-badge {
            font-size: 0.65rem;
            background: rgba(230, 21, 54, 0.1);
            color: var(--cherry-light);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(230, 21, 54, 0.15);
        }

        .sidebar-footer {
            border-top: 1px solid rgba(230, 21, 54, 0.08);
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-profile img {
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 2px solid var(--cherry);
        }
        .user-info { display: flex; flex-direction: column; min-width: 0; }
        .user-info .name { font-size: 0.84rem; font-weight: 700; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .user-info .role { font-size: 0.68rem; color: var(--muted); }

        .footer-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .footer-nav a {
            font-size: 0.78rem;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .footer-nav a:hover { color: var(--cherry-light); }

        /* === MAIN CONTENT === */
        .studio-main {
            flex: 1;
            margin-left: 280px;
            padding: 40px 48px;
            transition: var(--transition);
        }

        .studio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .studio-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .studio-header p {
            font-size: 0.85rem;
            color: var(--muted);
        }

        /* === PANELS / CARDS === */
        .glass-panel {
            background: var(--dark-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 36px;
            backdrop-filter: blur(25px) saturate(220%);
            -webkit-backdrop-filter: blur(25px) saturate(220%);
            box-shadow: 0 25px 70px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
            max-width: 760px;
            margin: 0 auto;
        }

        /* === FORM FIELDS === */
        .field { margin-bottom: 24px; }
        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .field label i { color: var(--cherry-light); margin-right: 4px; }
        
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: #fff;
            font-family: inherit;
            font-size: 0.88rem;
            outline: none;
            transition: var(--transition);
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: var(--cherry-light);
            background: rgba(230, 21, 54, 0.02);
            box-shadow: 0 0 0 3px rgba(230, 21, 54, 0.08);
        }
        .field textarea { min-height: 100px; resize: vertical; }

        .row-fields {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        /* Social lookup input */
        .social-input-wrap {
            display: flex; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; background: rgba(0, 0, 0, 0.4);
        }
        .social-input-wrap input { border: none; background: transparent; flex: 1; }
        .social-lookup-btn {
            width: 48px; border: none; background: rgba(230, 21, 54, 0.08); color: var(--cherry-light); cursor: pointer; transition: var(--transition);
        }
        .social-lookup-btn:hover { background: rgba(230, 21, 54, 0.15); color: #fff; }

        /* Scenepack Thumbnail Preview Box */
        .thumb-preview-box {
            margin-top: 14px;
            width: 160px; height: 100px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            display: none; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .thumb-preview-box.show { display: flex; }
        .thumb-preview-box img { width: 100%; height: 100%; object-fit: cover; }

        /* === BTNS === */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px 24px; border-radius: var(--radius-md); font-size: 0.84rem; font-weight: 700;
            border: none; cursor: pointer; transition: var(--transition); font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--cherry), var(--cherry-dark));
            color: #fff; border: 1px solid rgba(255, 77, 109, 0.2);
            box-shadow: 0 4px 20px rgba(230, 21, 54, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px); box-shadow: 0 8px 30px rgba(230, 21, 54, 0.5);
        }
        .btn-primary:disabled {
            opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none;
        }
        .btn-ghost {
            background: rgba(230, 21, 54, 0.05); color: var(--text); border: 1px solid rgba(230, 21, 54, 0.12);
        }
        .btn-ghost:hover { background: rgba(230, 21, 54, 0.1); border-color: var(--border-hover); }

        .form-actions {
            display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.04);
        }

        /* === LOCK / ACCESS DENIED SCREEN === */
        .lock-container {
            display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 160px); width: 100%;
        }
        .lock-card {
            max-width: 480px; text-align: center; padding: 48px 36px;
            background: var(--dark-panel); border: 1px solid var(--border); border-radius: var(--radius-lg);
            box-shadow: 0 25px 70px rgba(0,0,0,0.6);
        }
        .lock-card i.lock-icon { font-size: 4rem; color: var(--cherry); opacity: 0.2; margin-bottom: 24px; display: block; }
        .lock-card h2 { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .lock-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
        .lock-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn-discord { background: #5865F2; color: #fff; }
        .btn-discord:hover { background: #4752c4; transform: translateY(-2px); }

        /* === ALERTS === */
        .studio-alert {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 10000; padding: 12px 24px; border-radius: 30px; font-size: 0.84rem; font-weight: 700;
            display: none; align-items: center; gap: 8px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: alertIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes alertIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .studio-alert.show { display: flex; }
        .studio-alert.error { background: rgba(230, 21, 54, 0.15); border: 1px solid rgba(230, 21, 54, 0.25); color: var(--cherry-light); }
        .studio-alert.success { background: rgba(0, 200, 100, 0.15); border: 1px solid rgba(0, 200, 100, 0.25); color: #00e676; }

        /* === MOBILE MENU TRIGGER === */
        .mobile-trigger {
            display: none;
            background: transparent; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; z-index: 1000;
        }

        /* === RESPONSIVE === */
        @media(max-width: 900px) {
            .studio-sidebar { left: -280px; }
            .studio-sidebar.open { left: 0; }
            .studio-main { margin-left: 0; padding: 32px 20px; }
            .mobile-trigger { display: block; }
        }
    </style>
</head>
<body>
    <div class="bg-aura"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
    <div class="grid-bg"></div>

    <div class="studio-alert" id="alertBox"></div>

    <div class="studio-container">
        <!-- SIDEBAR -->
        <div class="studio-sidebar" id="sidebar">
            <div>
                <a href="/" class="sidebar-brand">
                    <img src="assets/content.png" alt="Zyrex Logo">
                    <span>Creator Studio</span>
                </a>
                <ul class="sidebar-menu">
                    <span class="menu-title">Publish Portals</span>
                    <li class="menu-item" id="sidebarPreset">
                        <a href="/upload"><i class="fas fa-sliders"></i> <span>Preset Uploader</span></a>
                    </li>
                    <li class="menu-item" id="sidebarAudio">
                        <a href="/upload-audio"><i class="fas fa-music"></i> <span>Audio Uploader</span></a>
                    </li>
                    <li class="menu-item active">
                        <a href="/upload-scenepack"><i class="fas fa-film"></i> <span>Scenepack Uploader</span></a>
                    </li>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile" id="userProfile" style="display:none">
                    <img src="" id="userAvatar" alt="">
                    <div class="user-info">
                        <span class="name" id="userName">Creator</span>
                        <span class="role">Zyrex Partner</span>
                    </div>
                </div>
                <div class="footer-nav">
                    <a href="/settings"><i class="fas fa-cog"></i> Dashboard Settings</a>
                    <a href="/"><i class="fas fa-arrow-left"></i> Back to Main Site</a>
                    <a href="/api/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>

        <!-- MAIN MAIN -->
        <div class="studio-main">
            <!-- TOP BAR -->
            <div class="studio-header">
                <div>
                    <button class="mobile-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1>Scenepack Upload</h1>
                    <p>Publish scene packs and project media folders on the scenepacks archive</p>
                </div>
            </div>

            <!-- CONTENT CARD -->
            <div class="glass-panel" id="mainPanel" style="display:none">
                <div class="field">
                    <label><i class="fas fa-clapperboard"></i> Scenepack Name *</label>
                    <input type="text" id="spName" placeholder="Tom Holland - Spider-Man Scene Pack (4K 60FPS)">
                </div>

                <div class="field">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="spDesc" placeholder="Provide information on clip resolutions, frame rates, length, and contents..."></textarea>
                </div>

                <div class="field">
                    <label><i class="fas fa-download"></i> Download Link * (Mega, Drive, Dropbox, Mediafire)</label>
                    <input type="url" id="spLink" placeholder="https://mega.nz/file/...">
                </div>

                <div class="row-fields">
                    <div class="field">
                        <label><i class="fas fa-link"></i> Creator Social URL (optional)</label>
                        <div class="social-input-wrap">
                            <input type="url" id="socialUrl" placeholder="https://tiktok.com/@creator" onblur="resolveCreator()">
                            <button class="social-lookup-btn" onclick="toggleHlx()" title="Social Lookup"><i class="fas fa-magic"></i></button>
                        </div>
                    </div>
                    <div class="field">
                        <label><i class="fas fa-user"></i> Creator Name (optional)</label>
                        <input type="text" id="creatorName" placeholder="Auto-filled from social URL" readonly style="background:rgba(0,0,0,0.2);cursor:not-allowed">
                    </div>
                </div>

                <div class="field">
                    <label><i class="fas fa-image"></i> Thumbnail URL (optional)</label>
                    <input type="url" id="spThumb" placeholder="https://i.imgur.com/xxxxx.png" onchange="previewThumb(this.value)">
                    <div class="thumb-preview-box" id="thumbPreviewBox">
                        <img src="" id="thumbPreviewImg" alt="Thumbnail Preview">
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/scenepack" class="btn btn-ghost">Cancel</a>
                    <button class="btn btn-primary" id="btnSubmit" onclick="submitSP()"><i class="fas fa-upload"></i> Publish Scenepack</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SOCIAL LOOKUP MODAL -->
    <div id="hlxOverlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);align-items:center;justify-content:center" onclick="if(event.target===this)toggleHlx()">
        <div style="background:rgba(15,4,7,0.98);border:1px solid var(--border);border-radius:20px;padding:32px;width:420px;max-width:90vw;box-shadow:0 25px 60px rgba(0,0,0,0.7)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <span style="font-size:0.9rem;font-weight:700;color:var(--text);"><i class="fas fa-magic" style="color:var(--cherry-light);margin-right:6px"></i>Social Lookup</span>
                <button onclick="toggleHlx()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem">&times;</button>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px" id="hlxPlatforms">
                <button class="btn-icon active" data-plat="tiktok" onclick="selHlxPlat(this,'tiktok')" style="width:40px;height:40px;border-radius:50%;background:rgba(230, 21, 54, 0.08);border:1px solid var(--border);color:var(--cherry-light);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;"><i class="fab fa-tiktok"></i></button>
                <button class="btn-icon" data-plat="instagram" onclick="selHlxPlat(this,'instagram')" style="width:40px;height:40px;border-radius:50%;background:rgba(230, 21, 54, 0.08);border:1px solid var(--border);color:var(--cherry-light);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;"><i class="fab fa-instagram"></i></button>
                <button class="btn-icon" data-plat="youtube" onclick="selHlxPlat(this,'youtube')" style="width:40px;height:40px;border-radius:50%;background:rgba(230, 21, 54, 0.08);border:1px solid var(--border);color:var(--cherry-light);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;"><i class="fab fa-youtube"></i></button>
                <button class="btn-icon" data-plat="x" onclick="selHlxPlat(this,'x')" style="width:40px;height:40px;border-radius:50%;background:rgba(230, 21, 54, 0.08);border:1px solid var(--border);color:var(--cherry-light);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;"><i class="fab fa-x-twitter"></i></button>
            </div>
            <div style="display:flex;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:18px">
                <span style="padding:14px 0 14px 18px;color:var(--muted);font-size:0.88rem" id="hlxPrefix">@</span>
                <input id="hlxUser" placeholder="username..." style="flex:1;padding:14px;background:transparent;border:none;color:#fff;font-family:inherit;font-size:0.88rem;outline:none" onkeydown="if(event.key==='Enter')hlxLookup()">
            </div>
            <button class="btn btn-primary" style="width:100%;font-size:0.84rem" onclick="hlxLookup()"><i class="fas fa-search"></i> Fetch Profile Info</button>
            <div id="hlxStatus" style="display:none;margin-top:14px;padding:10px;border-radius:8px;font-size:0.75rem;text-align:center"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        var currentUser = null;
        var hlxPlatform = 'tiktok';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        (async function checkAuth(){
            try {
                var meResp = await fetch('/api/me', {credentials:'include'});
                if (!meResp.ok) { window.location.href = '/api/login?redirect=' + encodeURIComponent(location.pathname); return; }
                currentUser = await meResp.json();
                
                // Show profile footer
                document.getElementById('userProfile').style.display = 'flex';
                if(currentUser.avatar) document.getElementById('userAvatar').src = currentUser.avatar;
                else document.getElementById('userAvatar').style.display = 'none';
                document.getElementById('userName').textContent = currentUser.global_name || currentUser.username;

                if (currentUser.is_admin) {
                    document.getElementById('mainPanel').style.display = 'block';
                    return;
                }

                // Check roles
                const roles=[
                    {id:'1519624224476762122',label:'Preset Uploader'},
                    {id:'1522976282688880720',label:'Audio Uploader'},
                    {id:'1522976376293167124',label:'Scenepack Uploader'}
                ];
                const checks=await Promise.all(roles.map(role=>fetch('/api/guild/check-role?userId='+currentUser.id+'&roleId='+role.id,{credentials:'include'}).then(resp=>resp.json()).then(d=>d.has_role).catch(()=>false)));
                const hasAny=checks.some(c=>c);
                if(!hasAny){
                    showLockScreen('No Creator Access', 'You do not have permission to access the upload studio. Connect to our Discord and claim a creator role.');
                    return;
                }
                
                // Update sidebar items
                if(!checks[0]){
                    document.getElementById('sidebarPreset').innerHTML = '<span class="locked-item"><i class="fas fa-lock"></i> <span>Preset Uploader</span> <span class="lock-badge">Locked</span></span>';
                }
                if(!checks[1]){
                    document.getElementById('sidebarAudio').innerHTML = '<span class="locked-item"><i class="fas fa-lock"></i> <span>Audio Uploader</span> <span class="lock-badge">Locked</span></span>';
                }
                if (!checks[2]) {
                    showLockScreen('No Scenepack Uploader Access', 'You do not have the <strong>Scenepack Uploader</strong> role on Discord yet. Claim it to unlock scenepack uploads.');
                    return;
                }
            } catch(e) { /* proceed */ }
            document.getElementById('mainPanel').style.display = 'block';
        })();

        function showLockScreen(title, text) {
            document.querySelector('.studio-main').innerHTML = `
                <div class="lock-container">
                    <div class="lock-card">
                        <i class="fas fa-lock lock-icon"></i>
                        <h2>${title}</h2>
                        <p>${text}</p>
                        <div class="lock-actions">
                            <a href="https://discord.gg/fAydSzpafA" target="_blank" class="btn btn-discord"><i class="fab fa-discord"></i> Join Discord Server</a>
                            <a href="/" class="btn btn-ghost"><i class="fas fa-home"></i> Go Back</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleHlx(){var o=document.getElementById('hlxOverlay');o.style.display=(o.style.display==='flex')?'none':'flex'}
        function selHlxPlat(btn,p){hlxPlatform=p;document.querySelectorAll('#hlxPlatforms .btn-icon').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
        
        async function hlxLookup(){
            var user=document.getElementById('hlxUser').value.trim();
            if(!user)return;
            var st=document.getElementById('hlxStatus');st.style.display='block';st.textContent='Searching...';st.className='';
            var platforms={tiktok:'https://www.tiktok.com/@'+user,instagram:'https://www.instagram.com/'+user,youtube:'https://www.youtube.com/@'+user,x:'https://x.com/'+user};
            var lookupUrl=platforms[hlxPlatform]||('https://www.tiktok.com/@'+user);
            try{
                var r=await fetch('/api/hlx/resolve?url='+encodeURIComponent(lookupUrl),{credentials:'include'});
                var d=await r.json();
                if(d.success){
                    var creatorDisplay=d.nickname;
                    document.getElementById('socialUrl').value=lookupUrl;
                    document.getElementById('creatorName').value=creatorDisplay;
                    st.style.color = '#00e676';
                    st.innerHTML='<i class="fas fa-check-circle"></i> Found: '+creatorDisplay;
                    setTimeout(toggleHlx, 1000);
                }else{
                    st.style.color = 'var(--cherry-light)';
                    st.textContent=d.error||'Not found';
                }
            }catch(e){st.style.color = 'var(--cherry-light)';st.textContent='Network error'}
        }

        async function resolveCreator(){
            var url = document.getElementById('socialUrl').value.trim();
            if (!url || !url.includes('.')) return;
            try {
                var r = await fetch('/api/hlx/resolve?url='+encodeURIComponent(url),{credentials:'include'});
                var d = await r.json();
                if (d.success && d.nickname) {
                    document.getElementById('creatorName').value = d.nickname;
                    alertMsg('Social resolved: ' + d.nickname, false);
                }
            } catch(e) {}
        }

        function previewThumb(url) {
            var box = document.getElementById('thumbPreviewBox');
            var img = document.getElementById('thumbPreviewImg');
            if (url && url.includes('.')) {
                img.src = url;
                box.classList.add('show');
            } else {
                box.classList.remove('show');
            }
        }

        async function submitSP(){
            var btn = document.getElementById('btnSubmit');
            var name = document.getElementById('spName').value.trim();
            var link = document.getElementById('spLink').value.trim();
            if (!name) return alertMsg('Name is required', true);
            if (!link) return alertMsg('Download link is required', true);
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting pack...';
            
            try {
                var payload = {
                    type: 'scenepack',
                    name: name,
                    category: 'scenepack',
                    description: document.getElementById('spDesc').value.trim(),
                    source_url: link,
                    thumbnail: document.getElementById('spThumb').value.trim(),
                    creator_nickname: document.getElementById('creatorName').value.trim(),
                    creator_social_url: document.getElementById('socialUrl').value.trim(),
                    file_path: '',
                    file_url: ''
                };
                
                var resp = await fetch('/api/products/submit', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload),
                    credentials: 'include'
                });
                var data = await resp.json();
                if (resp.ok && data.success) {
                    alertMsg('Published! Redirecting to scenepack page...', false);
                    setTimeout(function(){ window.location.href = '/product-scenepack?id='+data.id; }, 1500);
                } else {
                    throw new Error(data.error || 'Submit failed');
                }
            } catch(e) {
                alertMsg(e.message, true);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-upload"></i> Publish Scenepack';
            }
        }
        
        function alertMsg(msg, err) {
            var b = document.getElementById('alertBox');
            b.textContent = msg;
            b.className = 'studio-alert show ' + (err ? 'error' : 'success');
            setTimeout(function(){ b.classList.remove('show'); }, 5000);
        }
    </script>
</body>
</html>
