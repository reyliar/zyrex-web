<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyrex | Settings</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;color:#fff;font-family:Poppins,sans-serif;min-height:100vh}
        .settings-header{background:rgba(10,10,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(220,20,60,.1);padding:16px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .settings-header .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
        .settings-header .logo img{height:40px}
        .settings-container{max-width:900px;margin:0 auto;padding:40px 20px}
        .settings-container h1{font-size:1.8rem;margin-bottom:4px}
        .settings-container .sub{color:#606070;margin-bottom:30px;font-size:.9rem}
        .settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
        .card{background:#121216;border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:24px;transition:all .3s}
        .card:hover{border-color:rgba(220,20,60,.15)}
        .card .icon{width:44px;height:44px;border-radius:10px;background:rgba(220,20,60,.1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#dc143c;margin-bottom:14px}
        .card h3{font-size:1rem;font-weight:700;margin-bottom:6px}
        .card p{font-size:.8rem;color:#606070;margin-bottom:14px;line-height:1.4}
        .card .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .3s;text-decoration:none}
        .btn-primary{background:#dc143c;color:#fff}
        .btn-primary:hover{background:#ff1a45}
        .btn-secondary{background:rgba(255,255,255,.06);color:#fff}
        .btn-secondary:hover{background:rgba(255,255,255,.1)}
        .user-profile{display:flex;align-items:center;gap:16px;padding:20px;background:rgba(255,255,255,.02);border-radius:12px;margin-bottom:30px}
        .user-profile img{width:56px;height:56px;border-radius:50%;border:2px solid rgba(220,20,60,.3)}
        .user-profile .info h2{font-size:1.2rem;font-weight:700}
        .user-profile .info span{font-size:.8rem;color:#606070}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;margin-top:6px}
        .badge-admin{background:rgba(220,20,60,.12);color:#ff4d6d}
        .badge-upload{background:rgba(0,200,100,.12);color:#00c864}
        @media(max-width:600px){.settings-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="settings-header">
        <a href="/" class="logo">
            <img src="https://cdn.discordapp.com/attachments/1421433783717990570/1519453492572328039/content.png?ex=6a3d9cd6&is=6a3c4b56&hm=d923795bdb21d6d38a09fa9bdbf8584fef5b10c1eadc2ef7b2d6b71c52b46bc5&" alt="">
            <span>Settings</span>
        </a>
        <a href="/api/logout" style="color:#606070;font-size:.8rem;text-decoration:none"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="settings-container">
        <div id="userProfile"></div>
        <div id="adminSection"></div>
        <div id="uploadSection"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const resp = await fetch('/api/me', { credentials: 'include' });
            if (!resp.ok) { window.location.href = '/'; return; }
            const user = await resp.json();

            const avatarUrl = user.avatar
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
                : '';

            // Profile
            document.getElementById('userProfile').innerHTML = `
                <div class="user-profile">
                    ${avatarUrl ? `<img src="${avatarUrl}" alt="">` : '<div style="width:56px;height:56px;border-radius:50%;background:#1c1c24"></div>'}
                    <div class="info">
                        <h2>${user.global_name || user.username}</h2>
                        <span>@${user.username}</span>
                        ${user.is_admin ? '<div class="badge badge-admin"><i class="fas fa-crown"></i> Admin</div>' : ''}
                        ${user.can_upload ? '<div class="badge badge-upload"><i class="fas fa-upload"></i> Uploader</div>' : ''}
                    </div>
                </div>
            `;

            // Admin section
            if (user.is_admin) {
                document.getElementById('adminSection').innerHTML = `
                    <h3 style="margin-bottom:16px"><i class="fas fa-shield-halved" style="color:#dc143c"></i> Admin Panel</h3>
                    <div class="settings-grid">
                        <div class="card">
                            <div class="icon"><i class="fas fa-box"></i></div>
                            <h3>Manage Products</h3>
                            <p>View, edit or delete presets and plugins.</p>
                            <button class="btn btn-secondary" onclick="loadProducts()"><i class="fas fa-list"></i> List Products</button>
                        </div>
                        <div class="card">
                            <div class="icon"><i class="fas fa-users"></i></div>
                            <h3>Server Members</h3>
                            <p>View Discord server members and their roles.</p>
                            <button class="btn btn-secondary" onclick="loadMembers()"><i class="fas fa-eye"></i> View Members</button>
                        </div>
                        <div class="card">
                            <div class="icon"><i class="fas fa-cube"></i></div>
                            <h3>SFTP Storage</h3>
                            <p>Access SFTPGo storage panel.</p>
                            <a href="https://storage.zyrexediting.xyz" target="_blank" class="btn btn-secondary"><i class="fas fa-external-link-alt"></i> Open Storage</a>
                        </div>
                    </div>
                    <div id="adminContent" style="margin-top:20px"></div>
                `;
            }

            // Upload section
            if (user.can_upload && !user.is_admin) {
                document.getElementById('uploadSection').innerHTML = `
                    <h3 style="margin-bottom:16px"><i class="fas fa-upload" style="color:#00c864"></i> Upload Panel</h3>
                    <div class="settings-grid">
                        <div class="card">
                            <div class="icon"><i class="fas fa-cloud-upload-alt"></i></div>
                            <h3>Upload Product</h3>
                            <p>Upload presets or plugins to the platform.</p>
                            <a href="https://storage.zyrexediting.xyz" target="_blank" class="btn btn-primary"><i class="fas fa-upload"></i> Go to Storage</a>
                        </div>
                    </div>
                `;
            }

        } catch(e) {
            window.location.href = '/';
        }
    });

    async function loadProducts() {
        const container = document.getElementById('adminContent');
        container.innerHTML = '<p style="color:#606070"><i class="fas fa-spinner fa-spin"></i> Loading...</p>';
        try {
            const resp = await fetch('/api/products');
            const products = await resp.json();
            if (products.length === 0) {
                container.innerHTML = '<p style="color:#606070">No products found.</p>';
                return;
            }
            container.innerHTML = `
                <div class="card">
                    <h3 style="margin-bottom:12px">Products (${products.length})</h3>
                    <div style="display:flex;flex-direction:column;gap:8px">
                    ${products.map(p => `
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:8px">
                            <div>
                                <strong style="font-size:.85rem">${p.name}</strong>
                                <span style="font-size:.7rem;color:#606070;margin-left:8px">${p.type} - ${p.category}</span>
                            </div>
                            <button class="btn btn-secondary" style="padding:4px 12px;font-size:.7rem" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    `).join('')}
                    </div>
                </div>
            `;
        } catch(e) {
            container.innerHTML = '<p style="color:#ff4d6d">Failed to load products.</p>';
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Delete this product?')) return;
        try {
            const resp = await fetch(`/api/products/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                loadProducts();
            } else {
                alert('Failed to delete');
            }
        } catch(e) {
            alert('Error');
        }
    }

    async function loadMembers() {
        const container = document.getElementById('adminContent');
        container.innerHTML = '<p style="color:#606070"><i class="fas fa-spinner fa-spin"></i> Loading...</p>';
        try {
            const resp = await fetch('/api/guild/stats');
            const data = await resp.json();
            container.innerHTML = `
                <div class="card">
                    <h3 style="margin-bottom:12px">${data.name}</h3>
                    <p style="color:#606070;font-size:.85rem">Members: ${data.member_count} | Online: ${data.online_count} | Boost: ${data.boost_level}</p>
                    <p style="color:#505060;font-size:.75rem;margin-top:8px">Detailed member list requires Discord API Gateway connection.</p>
                </div>
            `;
        } catch(e) {
            container.innerHTML = '<p style="color:#ff4d6d">Failed to load server data.</p>';
        }
    }
    </script>
</body>
</html>
