<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyrex | Settings & Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07070a;
            --card-bg: #0d0d12;
            --card-border: rgba(255, 255, 255, 0.03);
            --cherry: #dc143c;
            --cherry-glow: rgba(220, 20, 60, 0.25);
            --cherry-light: #ff4d6d;
            --text-main: #ffffff;
            --text-muted: #808090;
            --success: #00c864;
            --success-glow: rgba(0, 200, 100, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 20%, rgba(220, 20, 60, 0.05) 0%, transparent 60%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        .settings-header {
            background: rgba(7, 7, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(220, 20, 60, 0.08);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .settings-header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .settings-header .logo img {
            height: 36px;
            filter: drop-shadow(0 0 8px var(--cherry-glow));
        }

        .settings-header .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }

        .settings-header .logout-btn:hover {
            color: var(--cherry-light);
            border-color: rgba(220, 20, 60, 0.2);
            background: rgba(220, 20, 60, 0.05);
        }

        .settings-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            border-left: 3px solid var(--cherry);
            padding-left: 12px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(220, 20, 60, 0.02) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(220, 20, 60, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card .icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: rgba(220, 20, 60, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--cherry-light);
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
        }

        .card.uploader-card .icon {
            background: rgba(0, 200, 100, 0.08);
            color: var(--success);
        }

        .card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
        }

        .card p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 18px;
            line-height: 1.5;
            position: relative;
            z-index: 2;
        }

        .card .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.3s;
            text-decoration: none;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .btn-primary {
            background: var(--cherry);
            color: #fff;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.2);
        }

        .btn-primary:hover {
            background: var(--cherry-light);
            box-shadow: 0 6px 20px rgba(220, 20, 60, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* User profile area */
        .user-dashboard {
            background: linear-gradient(135deg, rgba(20, 20, 28, 0.6) 0%, rgba(13, 13, 18, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .user-profile-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 280px;
        }

        .user-profile-meta img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid var(--cherry-glow);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.15);
        }

        .user-profile-meta .profile-fallback {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #151520;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-profile-meta .info h2 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .user-profile-meta .info span {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-admin {
            background: rgba(220, 20, 60, 0.08);
            color: var(--cherry-light);
            border: 1px solid rgba(220, 20, 60, 0.15);
        }

        .badge-upload {
            background: rgba(0, 200, 100, 0.08);
            color: var(--success);
            border: 1px solid rgba(0, 200, 100, 0.15);
        }

        /* Storage box */
        .storage-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 16px 20px;
            min-width: 320px;
            flex: 1;
        }

        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .storage-header span {
            color: var(--text-muted);
        }

        .storage-progress-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .storage-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--cherry) 0%, var(--cherry-light) 100%);
            border-radius: 4px;
            width: 0%;
            transition: width 1s ease-out;
            box-shadow: 0 0 10px var(--cherry-glow);
        }

        .storage-progress-bar.warning {
            background: linear-gradient(90deg, #ffaa00 0%, #ffcc00 100%);
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.25);
        }

        .storage-progress-bar.danger {
            background: linear-gradient(90deg, #ff3333 0%, var(--cherry-light) 100%);
            box-shadow: 0 0 10px rgba(255, 50, 50, 0.25);
        }

        .storage-footer {
            font-size: 0.72rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        /* Content panels */
        .content-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            margin-top: 30px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .panel-header h3 {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .search-wrap {
            position: relative;
            width: 100%;
            max-width: 320px;
        }

        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .search-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px 16px 10px 38px;
            color: #fff;
            font-family: inherit;
            font-size: 0.82rem;
            transition: all 0.3s;
        }

        .search-wrap input:focus {
            outline: none;
            border-color: rgba(220, 20, 60, 0.3);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.08);
        }

        /* Products Table */
        .table-responsive {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.85rem;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 14px 18px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .badge-table {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-preset { background: rgba(220, 20, 60, 0.08); color: var(--cherry-light); }
        .badge-plugin { background: rgba(0, 200, 100, 0.08); color: var(--success); }

        .btn-action-delete {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(220, 20, 60, 0.08);
            color: var(--cherry-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-action-delete:hover {
            background: var(--cherry);
            color: #fff;
            border-color: var(--cherry);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        /* Members Grid */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
        }

        .member-card:hover {
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }

        .member-card img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
        }

        .member-card .member-fallback {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .member-card .minfo {
            flex: 1;
            min-width: 0;
        }

        .member-card .minfo h4 {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-card .minfo span {
            font-size: 0.72rem;
            color: var(--text-muted);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .user-dashboard {
                flex-direction: column;
                align-items: stretch;
            }
            .storage-box {
                min-width: 100%;
            }
            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrap {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="settings-header">
        <a href="/" class="logo">
            <img src="assets/content.png" alt="ZYREX">
            <span>Dashboard</span>
        </a>
        <a href="/api/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="settings-container">
        <!-- Profile Dashboard -->
        <div id="userProfile" class="user-dashboard">
            <div class="user-profile-meta">
                <div class="profile-fallback"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="info">
                    <h2>Loading Profile...</h2>
                </div>
            </div>
        </div>

        <!-- Uploader Panel -->
        <div id="uploadSection"></div>

        <!-- Admin Panel -->
        <div id="adminSection"></div>

        <!-- Dynamic Content Section -->
        <div id="panelContentContainer" style="display: none;"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
    let currentUser = null;
    let allProducts = [];

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const resp = await fetch('/api/me', { credentials: 'include' });
            if (!resp.ok) { window.location.href = '/'; return; }
            currentUser = await resp.json();

            // Load visual profile & storage usage
            renderProfile(currentUser);

            // Populate Panels
            renderAccessPanels(currentUser);

            // Fetch SFTP Account details for storage bar
            if (currentUser.can_upload || currentUser.is_admin) {
                loadSFTPQuota();
            }

        } catch(e) {
            console.error("Dashboard auth error:", e);
            window.location.href = '/';
        }
    });

    function renderProfile(user) {
        const avatarUrl = user.avatar
            ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
            : '';

        const profileMetaHtml = `
            <div class="user-profile-meta">
                ${avatarUrl ? `<img src="${avatarUrl}" alt="">` : '<div class="profile-fallback"><i class="fas fa-user"></i></div>'}
                <div class="info">
                    <h2>${user.global_name || user.username}</h2>
                    <span>@${user.username}</span>
                    <div style="display:flex;gap:6px;flex-wrap:wrap">
                        ${user.is_admin ? '<span class="badge badge-admin"><i class="fas fa-crown"></i> Admin</span>' : ''}
                        ${user.can_upload ? '<span class="badge badge-upload"><i class="fas fa-upload"></i> Uploader</span>' : ''}
                    </div>
                </div>
            </div>
            <div class="storage-box" id="storageBox" style="display:none">
                <div class="storage-header">
                    <span>Cloud Storage (SFTPGo)</span>
                    <span id="storagePerc">0%</span>
                </div>
                <div class="storage-progress-bg">
                    <div class="storage-progress-bar" id="storageProgressBar"></div>
                </div>
                <div class="storage-footer">
                    <span id="storageUsed">0 B used</span>
                    <span id="storageTotal">0 B total</span>
                </div>
            </div>
        `;
        document.getElementById('userProfile').innerHTML = profileMetaHtml;
    }

    function renderAccessPanels(user) {
        // Render Uploader Panel
        if (user.can_upload && !user.is_admin) {
            document.getElementById('uploadSection').innerHTML = `
                <h3 class="section-title"><i class="fas fa-cloud-upload-alt" style="color:var(--success)"></i> Upload Panel</h3>
                <div class="settings-grid">
                    <div class="card uploader-card">
                        <div class="icon"><i class="fas fa-upload"></i></div>
                        <h3>Upload Resource</h3>
                        <p>Upload your presets, templates, or plugins to the platform catalog.</p>
                        <a href="/upload" class="btn btn-primary" style="background:var(--success)"><i class="fas fa-plus"></i> Open Upload Wizard</a>
                    </div>
                    <div class="card uploader-card">
                        <div class="icon"><i class="fas fa-folder-open"></i></div>
                        <h3>SFTP Access</h3>
                        <p>Directly manage files in your dedicated SFTPGo directory via web dashboard.</p>
                        <a href="https://storage.zyrexediting.xyz" target="_blank" class="btn btn-secondary"><i class="fas fa-external-link-alt"></i> SFTP Web Client</a>
                    </div>
                </div>
            `;
        }

        // Render Admin Panel
        if (user.is_admin) {
            document.getElementById('adminSection').innerHTML = `
                <h3 class="section-title"><i class="fas fa-shield-halved" style="color:var(--cherry)"></i> Administrative Actions</h3>
                <div class="settings-grid">
                    <div class="card">
                        <div class="icon"><i class="fas fa-box"></i></div>
                        <h3>Manage Products</h3>
                        <p>View, search, and delete presets or plugins currently registered in the database.</p>
                        <button class="btn btn-primary" onclick="loadProducts()"><i class="fas fa-list"></i> List Products</button>
                    </div>
                    <div class="card">
                        <div class="icon"><i class="fas fa-users"></i></div>
                        <h3>Authorized Users</h3>
                        <p>View a list of server members possessing administrative or uploader permissions.</p>
                        <button class="btn btn-secondary" onclick="loadMembers()"><i class="fas fa-eye"></i> View Members</button>
                    </div>
                    <div class="card">
                        <div class="icon"><i class="fas fa-plus-circle"></i></div>
                        <h3>Upload Wizard</h3>
                        <p>Quick link to the multi-step product registration wizard for admins.</p>
                        <a href="/upload" class="btn btn-secondary"><i class="fas fa-cloud-upload-alt"></i> Upload Product</a>
                    </div>
                </div>
            `;
        }
    }

    async function loadSFTPQuota() {
        try {
            const resp = await fetch('/api/sftpgo/account', { credentials: 'include' });
            const data = await resp.json();
            if (data.success && data.user) {
                const u = data.user;
                const quota = u.quota_size || 0;
                const used = u.used_quota_size || 0;
                
                if (quota > 0) {
                    const box = document.getElementById('storageBox');
                    box.style.display = 'block';
                    const pct = Math.min(100, Math.round((used / quota) * 100));
                    
                    const bar = document.getElementById('storageProgressBar');
                    document.getElementById('storagePerc').textContent = `${pct}%`;
                    bar.style.width = `${pct}%`;
                    
                    // Set progress color based on usage percentage
                    bar.className = 'storage-progress-bar';
                    if (pct >= 85) {
                        bar.classList.add('danger');
                    } else if (pct >= 60) {
                        bar.classList.add('warning');
                    }

                    document.getElementById('storageUsed').textContent = `${formatBytes(used)} used`;
                    document.getElementById('storageTotal').textContent = `${formatBytes(quota)} quota`;
                }
            }
        } catch(e) {
            console.warn("Could not retrieve SFTP quota details:", e);
        }
    }

    async function loadProducts() {
        const container = document.getElementById('panelContentContainer');
        container.style.display = 'block';
        container.innerHTML = `
            <div class="content-panel">
                <div class="panel-header">
                    <h3>Registered Database Products</h3>
                    <div class="search-wrap">
                        <i class="fas fa-search"></i>
                        <input type="text" id="adminProductSearch" placeholder="Search by name or creator..." onkeyup="filterAdminProducts()">
                    </div>
                </div>
                <div id="productsListArea"><p style="color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i> Loading products...</p></div>
            </div>
        `;
        // Scroll to panel
        container.scrollIntoView({ behavior: 'smooth' });

        try {
            const resp = await fetch('/api/products');
            allProducts = await resp.json();
            renderAdminProductsList(allProducts);
        } catch(e) {
            document.getElementById('productsListArea').innerHTML = '<p style="color:var(--cherry-light)"><i class="fas fa-times-circle"></i> Failed to load products.</p>';
        }
    }

    function renderAdminProductsList(products) {
        const area = document.getElementById('productsListArea');
        if (products.length === 0) {
            area.innerHTML = '<p style="color:var(--text-muted);padding:20px 0;text-align:center"><i class="fas fa-folder-open" style="font-size:1.5rem;display:block;margin-bottom:8px"></i> No products match criteria.</p>';
            return;
        }

        area.innerHTML = `
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Platform</th>
                            <th>Uploader</th>
                            <th style="text-align:center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                    ${products.map(p => `
                        <tr>
                            <td style="font-weight:600">${p.name}</td>
                            <td><span class="badge-table badge-${p.type}">${p.type}</span></td>
                            <td style="color:var(--text-muted)">${p.category}</td>
                            <td>
                                <span style="font-size:.75rem">
                                    ${p.platform === 'win' ? '<i class="fab fa-windows" title="Windows"></i> WIN' : 
                                      p.platform === 'mac' ? '<i class="fab fa-apple" title="Mac"></i> MAC' : 
                                      '<i class="fas fa-laptop" title="Both Platforms"></i> BOTH'}
                                </span>
                            </td>
                            <td style="color:var(--text-muted)">${p.author_name || 'System'}</td>
                            <td style="display:flex;justify-content:center">
                                <button class="btn-action-delete" title="Delete Product" onclick="deleteProduct('${p.id}')">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function filterAdminProducts() {
        const query = document.getElementById('adminProductSearch').value.toLowerCase().trim();
        if (!query) {
            renderAdminProductsList(allProducts);
            return;
        }
        const filtered = allProducts.filter(p => 
            (p.name || '').toLowerCase().includes(query) || 
            (p.author_name || '').toLowerCase().includes(query) ||
            (p.category || '').toLowerCase().includes(query)
        );
        renderAdminProductsList(filtered);
    }

    async function deleteProduct(id) {
        if (!confirm('Are you absolutely sure you want to permanently delete this product?')) return;
        try {
            const resp = await fetch(`/api/products/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                // Remove local copy and update list
                allProducts = allProducts.filter(p => p.id !== id);
                filterAdminProducts();
            } else {
                alert('Deletion failed. Please try again.');
            }
        } catch(e) {
            alert('Error trying to contact API server.');
        }
    }

    async function loadMembers() {
        const container = document.getElementById('panelContentContainer');
        container.style.display = 'block';
        container.innerHTML = `
            <div class="content-panel">
                <div class="panel-header">
                    <h3>Authorized Server Members</h3>
                </div>
                <div id="membersListArea"><p style="color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i> Fetching active uploaders and admins...</p></div>
            </div>
        `;
        container.scrollIntoView({ behavior: 'smooth' });

        try {
            const resp = await fetch('/api/guild/members');
            const data = await resp.json();
            if (data.success && data.members) {
                renderMembersList(data.members);
            } else {
                document.getElementById('membersListArea').innerHTML = '<p style="color:var(--cherry-light)"><i class="fas fa-times-circle"></i> Failed to retrieve active member list.</p>';
            }
        } catch(e) {
            document.getElementById('membersListArea').innerHTML = '<p style="color:var(--cherry-light)"><i class="fas fa-times-circle"></i> Connection to backend bot failed.</p>';
        }
    }

    function renderMembersList(members) {
        const area = document.getElementById('membersListArea');
        if (members.length === 0) {
            area.innerHTML = '<p style="color:var(--text-muted)">No authorized members found in the cache.</p>';
            return;
        }

        // Sort by role (admins first)
        members.sort((a, b) => b.is_admin - a.is_admin);

        area.innerHTML = `
            <div class="members-grid">
            ${members.map(m => {
                const avatar = m.avatar 
                    ? `https://cdn.discordapp.com/avatars/${m.id}/${m.avatar}.png?size=64`
                    : '';
                return `
                    <div class="member-card">
                        ${avatar ? `<img src="${avatar}" alt="">` : '<div class="member-fallback"><i class="fas fa-user-circle"></i></div>'}
                        <div class="minfo">
                            <h4>${m.global_name || m.username}</h4>
                            <span>@${m.username}</span>
                            <div style="display:flex;gap:4px">
                                ${m.is_admin ? '<span class="badge badge-admin" style="font-size:0.55rem;padding:1px 6px">Admin</span>' : ''}
                                ${m.is_uploader ? '<span class="badge badge-upload" style="font-size:0.55rem;padding:1px 6px">Uploader</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('')}
            </div>
        `;
    }

    function formatBytes(bytes, decimals = 2) {
        if (!bytes) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }
    </script>
</body>
