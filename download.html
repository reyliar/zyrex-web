<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Download - Zyrex</title>
    <meta name="description" content="Zyrex Editing - Secure download page for presets and editing resources.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zyrexediting.xyz/download">
    <meta property="og:title" content="Zyrex Editing">
    <meta property="og:description" content="Free resources, plugins, softwares, and more.">
    <meta property="og:image" content="https://zyrexediting.xyz/assets/banner.png">
    <meta property="og:image:width" content="2110">
    <meta property="og:image:height" content="745">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://zyrexediting.xyz/assets/banner.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cherry: #a80f2d;
            --cherry-rgb: 168,15,45;
            --blurple: #5865F2;
            --blurple-rgb: 88,101,242;
            --dark: #060608;
            --card: #0a0a10;
            --light: #e8e8ed;
            --gray: #8888a0;
            --gray-dark: #55556a;
        }
        * { margin:0; padding:0; box-sizing:border-box }
        body {
            background: var(--dark);
            background-image: radial-gradient(circle at 50% 20%, rgba(var(--cherry-rgb),.03) 0%, transparent 55%);
            color: var(--light);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-grid {
            position: fixed; inset:0; pointer-events: none; z-index:0;
            background-image: linear-gradient(rgba(255,255,255,.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.01) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 25%, transparent 70%);
        }
        .glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .06;
            pointer-events: none;
        }
        .glow-top { background: var(--cherry); top: 5%; left: 50%; transform: translate(-50%,0) }
        .glow-bot { background: var(--blurple); bottom: 0; left: 50%; transform: translate(-50%,30%); opacity: .04 }

        .page-wrap {
            position: relative; z-index:1;
            width: 100%; max-width: 520px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* States */
        .state { display:none; text-align:center; width:100% }
        .state.active { display:block }
        .loader { width:40px; height:40px; border:3px solid rgba(255,255,255,.05); border-top-color:var(--cherry); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 20px }
        @keyframes spin { to{transform:rotate(360deg)} }
        .state-err-icon { font-size:3rem; color:var(--cherry); opacity:.3; margin-bottom:16px; display:block }
        .state-err h2 { font-size:1.2rem; font-weight:700; color:var(--light); margin-bottom:6px }
        .state-err p { color:var(--gray); font-size:.85rem; margin-bottom:24px }

        /* 404 */
        .state-404 .code-404 { font-size:6rem; font-weight:900; letter-spacing:-3px; background:linear-gradient(135deg,#a80f2d,#e8456a,#a80f2d); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height:1 }
        .state-404 .badge-404 { display:inline-block; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--cherry); background:rgba(var(--cherry-rgb),.08); border:1px solid rgba(var(--cherry-rgb),.12); padding:4px 12px; border-radius:50px; margin:8px 0 20px }

        /* Thumbnail */
        .thumb-wrap {
            width: 100%; aspect-ratio: 16/9;
            border-radius: 16px; overflow: hidden;
            background: linear-gradient(135deg, #0e0e18, #141420, #0e0e18);
            border: 1px solid rgba(255,255,255,.04);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 28px; position: relative;
        }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index:1 }
        .thumb-wrap .ph-icon { position: absolute; font-size:4rem; color:var(--cherry); opacity:.08; z-index:0 }
        .thumb-badges { position: absolute; bottom:12px; left:14px; z-index:2; display:flex; gap:6px; flex-wrap:wrap }
        .tbadge { padding:4px 10px; border-radius:50px; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; background:rgba(0,0,0,.5); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.06); color:#fff; display:inline-flex; align-items:center; gap:4px }
        .tbadge.free { background:rgba(0,200,100,.15); border-color:rgba(0,200,100,.25); color:#00e676 }

        /* Title */
        .product-title { font-size: 1.5rem; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; letter-spacing: -.4px; line-height: 1.3 }
        .product-meta { font-size: .72rem; color: var(--gray); text-align: center; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap }
        .product-meta i { color: var(--cherry); font-size: .65rem }
        .product-meta .sep { width:3px; height:3px; border-radius:50%; background:var(--gray-dark) }

        /* Creator */
        .creator-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: rgba(255,255,255,.015); border: 1px solid rgba(255,255,255,.03); border-radius: 12px; margin-bottom: 20px; width: 100% }
        .creator-row img { width:32px; height:32px; border-radius:50%; border:1.5px solid rgba(var(--cherry-rgb),.15); object-fit:cover }
        .creator-row .cav-fb { width:32px; height:32px; border-radius:50%; background:rgba(var(--cherry-rgb),.1); display:flex; align-items:center; justify-content:center; color:var(--cherry); font-size:.65rem }
        .creator-row strong { font-size:.78rem; color:var(--light) }
        .creator-row a { font-size:.68rem; color:var(--cherry); text-decoration:none; margin-left:auto }
        .creator-row a:hover { text-decoration:underline }

        /* Uploader */
        .uploader-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: rgba(var(--blurple-rgb),.04); border: 1px solid rgba(var(--blurple-rgb),.08); border-radius: 12px; margin-bottom: 20px; width: 100% }
        .uploader-row img { width:30px; height:30px; border-radius:50%; border:1.5px solid rgba(var(--blurple-rgb),.15); object-fit:cover }
        .uploader-row .uav-fb { width:30px; height:30px; border-radius:50%; background:rgba(var(--blurple-rgb),.1); display:flex; align-items:center; justify-content:center; color:var(--blurple); font-size:.8rem }
        .uploader-row strong { font-size:.76rem; color:var(--light) }
        .uploader-row span { font-size:.66rem; color:var(--gray-dark) }

        /* Description */
        .desc-block { width: 100%; padding: 18px; background: rgba(255,255,255,.01); border: 1px solid rgba(255,255,255,.03); border-radius: 14px; margin-bottom: 20px; color: var(--gray); font-size: .82rem; line-height: 1.7 }
        .desc-block .desc-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gray-dark); margin-bottom: 10px; display: flex; align-items: center; gap: 6px }
        .desc-block .desc-label i { color: var(--cherry); font-size: .7rem }

        /* Files */
        .files-block { width: 100%; margin-bottom: 20px }
        .files-scroll { max-height: 260px; overflow-y: auto; border-radius: 10px; padding-right: 4px }
        .files-scroll::-webkit-scrollbar { width: 4px }
        .files-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 2px }
        .files-scroll::-webkit-scrollbar-track { background: transparent }
        .files-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gray-dark); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; justify-content: space-between }
        .files-label i { color: var(--cherry); font-size: .7rem }
        .files-label-right { display: flex; align-items: center; gap: 12px }
        .select-all-btn { font-size: .62rem; color: var(--cherry); cursor: pointer; background: none; border: 1px solid rgba(var(--cherry-rgb),.12); padding: 3px 8px; border-radius: 4px; font-family: inherit; transition: .15s }
        .select-all-btn:hover { background: rgba(var(--cherry-rgb),.08) }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: rgba(255,255,255,.01); border: 1px solid rgba(255,255,255,.02); border-radius: 8px; margin-bottom: 4px; font-size: .78rem; transition: .15s }
        .file-item:hover { background: rgba(var(--cherry-rgb),.02); border-color: rgba(var(--cherry-rgb),.06) }
        .file-item .fl { display:flex; align-items:center; gap:8px; min-width:0; flex:1 }
        .file-item .fl .file-cb { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1.5px solid rgba(255,255,255,.12); border-radius: 3px; background: transparent; cursor: pointer; flex-shrink: 0; position: relative; transition: .15s }
        .file-item .fl .file-cb:checked { background: var(--cherry); border-color: var(--cherry) }
        .file-item .fl .file-cb:checked::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: .5rem; color: #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) }
        .file-item .fl i { color:var(--cherry); font-size:.7rem; flex-shrink:0 }
        .file-item .fl span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--light) }
        .file-item .fs { color:var(--gray-dark); font-size:.7rem; flex-shrink:0; margin-left:8px }
        .file-item.file-watermark { opacity: .0; height: 0; padding: 0; margin: 0; border: none; overflow: hidden; pointer-events: none }
        .file-dl-btn { background: rgba(var(--cherry-rgb),.06); border:1px solid rgba(var(--cherry-rgb),.1); color: var(--cherry); cursor: pointer; padding: 3px 7px; border-radius: 5px; font-size: .7rem; transition: .15s; display: flex; align-items: center; gap: 3px; flex-shrink: 0; margin-left: 8px }
        .file-dl-btn:hover { background: rgba(var(--cherry-rgb),.12); border-color: rgba(var(--cherry-rgb),.18) }
        .file-dl-btn:disabled { opacity:.4; cursor:not-allowed }

        /* Password */
        .pw-block { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(var(--cherry-rgb),.03); border: 1px solid rgba(var(--cherry-rgb),.08); border-radius: 8px; font-size: .74rem; margin-bottom: 20px; cursor: pointer; user-select: all; color: var(--gray) }
        .pw-block i { color: var(--cherry); font-size: .7rem }
        .pw-block code { background: rgba(var(--cherry-rgb),.1); color: var(--cherry); padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: .78rem }

        /* Download Card */
        .dl-card { width: 100%; background: linear-gradient(135deg, rgba(var(--cherry-rgb),.1), rgba(var(--cherry-rgb),.03)); border: 1px solid rgba(var(--cherry-rgb),.15); border-radius: 18px; padding: 28px 24px; text-align: center; position: relative; overflow: hidden }
        .dl-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(var(--cherry-rgb),.06), transparent 70%); pointer-events: none }
        .dl-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px 20px; background: linear-gradient(135deg, #8a0a22, #5a0614, #3d020c); border: 1px solid rgba(var(--cherry-rgb),.25); border-radius: 12px; color: #fff; font-size: .95rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .2s; box-shadow: 0 6px 24px rgba(var(--cherry-rgb),.35), inset 0 1px 1px rgba(255,255,255,.08); position: relative; z-index: 1 }
        .dl-btn:hover { background: linear-gradient(135deg, #9c0b26, #6a0718, #4a030f); box-shadow: 0 8px 32px rgba(var(--cherry-rgb),.5), inset 0 1px 2px rgba(255,255,255,.12); transform: translateY(-1px) }
        .dl-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: 0 3px 12px rgba(var(--cherry-rgb),.15) }
        .dl-btn i { font-size: 1rem }

        /* Countdown */
        .countdown-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; font-size: .78rem; color: rgba(255,255,255,.5); position: relative; z-index: 1 }
        .countdown-row i { font-size: .7rem; opacity: .5 }
        .countdown-row .timer { font-weight: 700; color: rgba(255,255,255,.8); font-variant-numeric: tabular-nums; min-width: 45px; text-align: center }
        .countdown-row.warning .timer { color: #ffb700 }
        .countdown-row.expired .timer { color: #ff3860 }

        /* Stats */
        .dl-stats { text-align: center; margin-top: 6px; font-size: .7rem; color: var(--gray-dark) }

        /* Progress overlay */
        .prog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px }
        .prog-overlay.active { display: flex }
        .prog-ring { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,.06); border-top-color: var(--cherry); animation: spin .8s linear infinite }
        .prog-text { color: var(--light); font-size: .85rem; font-weight: 600 }
        .prog-bar-wrap { width: 280px; height: 5px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden }
        .prog-bar-fill { height: 100%; background: var(--cherry); border-radius: 3px; transition: width .3s; width: 0% }
        .prog-detail { color: var(--gray-dark); font-size: .7rem }

        /* Back link */
        .back-link { display: inline-flex; align-items: center; gap: 5px; color: var(--gray-dark); font-size: .72rem; text-decoration: none; margin-top: 28px; transition: .2s }
        .back-link:hover { color: var(--cherry) }

        /* Util buttons */
        .btn-ghost-sm { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 8px; font-size: .78rem; font-weight: 600; text-decoration: none; transition: .2s; font-family: inherit; cursor: pointer; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); color: var(--gray) }
        .btn-ghost-sm:hover { background: rgba(255,255,255,.05); color: var(--light) }
        .btn-cherry-sm { display: inline-flex; align-items: center; gap: 5px; padding: 8px 18px; border-radius: 8px; font-size: .78rem; font-weight: 600; text-decoration: none; transition: .2s; font-family: inherit; cursor: pointer; background: rgba(var(--cherry-rgb),.1); border: 1px solid rgba(var(--cherry-rgb),.18); color: var(--cherry) }
        .btn-cherry-sm:hover { background: rgba(var(--cherry-rgb),.18) }

        @media(max-width:480px) {
            .page-wrap { padding: 24px 16px }
            .product-title { font-size: 1.25rem }
            .dl-btn { font-size: .85rem; padding: 14px 16px }
            .dl-card { padding: 20px 16px }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow glow-top"></div>
    <div class="glow glow-bot"></div>

    <div class="page-wrap">
        <!-- Loading -->
        <div class="state active" id="st-load"><div class="loader"></div><p style="color:var(--gray-dark);font-size:.82rem">Loading...</p></div>
        
        <!-- Error -->
        <div class="state state-err" id="st-err">
            <i class="fas fa-exclamation-circle state-err-icon"></i>
            <h2>Download Unavailable</h2>
            <p id="errMsg">This download link is invalid or has expired.</p>
            <a href="https://zyrexediting.xyz/resources" class="btn-cherry-sm"><i class="fas fa-cubes"></i> Browse Resources</a>
        </div>

        <!-- 404 (no token, no id) -->
        <div class="state state-err state-404" id="st-404">
            <div class="code-404">404</div>
            <div class="badge-404">Page Not Found</div>
            <h2>No download specified</h2>
            <p>You need a valid download token or product ID to access this page.</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
                <a href="https://zyrexediting.xyz/" class="btn-cherry-sm"><i class="fas fa-home"></i> Home</a>
                <a href="https://zyrexediting.xyz/resources" class="btn-ghost-sm"><i class="fas fa-cubes"></i> Resources</a>
            </div>
        </div>

        <!-- Main content -->
        <div class="state" id="st-main"></div>
    </div>

    <!-- Progress overlay -->
    <div class="prog-overlay" id="progOverlay">
        <div class="prog-ring" id="progRing"></div>
        <div class="prog-text" id="progText">Preparing download...</div>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progBar"></div></div>
        <div class="prog-detail" id="progDetail"></div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/presets-data.js?v=5"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const productId = params.get('id');
        let downloadToken = null;
        let product = null;
        let countdownInterval = null;
        let tokenExpiryTime = null;

        function showState(id) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        }

        function showError(msg) {
            document.getElementById('errMsg').textContent = msg;
            showState('st-err');
        }

        // Countdown
        function updateCountdown() {
            const timerEl = document.getElementById('countdownTimer');
            const rowEl = document.getElementById('countdownRow');
            if (!timerEl || !rowEl) return;
            if (!tokenExpiryTime) { timerEl.textContent = '--:--'; return; }
            
            const remaining = Math.max(0, Math.floor((tokenExpiryTime - Date.now()) / 1000));
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            timerEl.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
            
            rowEl.classList.remove('warning', 'expired');
            if (remaining <= 0) {
                rowEl.classList.add('expired');
                timerEl.textContent = 'Expired';
                const btn = document.getElementById('dlBtn');
                if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-clock"></i> Link Expired'; }
                if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            } else if (remaining <= 60) {
                rowEl.classList.add('warning');
            }
        }

        function startCountdown(expiresInSeconds) {
            tokenExpiryTime = Date.now() + (expiresInSeconds * 1000);
            updateCountdown();
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        const iconMap = {"after-effects":"fa-film","premiere-pro":"fa-video","photoshop":"fa-image","video-star":"fa-star","topaz-labs":"fa-gem","others":"fa-folder"};
        const catLabels = {"after-effects":"After Effects","premiere-pro":"Premiere Pro","photoshop":"Photoshop","video-star":"Video Star","topaz-labs":"Topaz Labs","others":"Others"};

        async function fetchDiscordAvatar(userId) {
            if (!userId) return '';
            try {
                const resp = await fetch('/api/discord-user?userId=' + userId);
                const data = await resp.json();
                if (data.success && data.user && data.user.avatar) {
                    const ext = data.user.avatar.startsWith('a_') ? 'gif' : 'png';
                    return 'https://cdn.discordapp.com/avatars/' + userId + '/' + data.user.avatar + '.' + ext + '?size=64';
                }
            } catch(e) {}
            let defIdx = 0;
            try { defIdx = Number((BigInt(userId) >> 22n) % 6n); } catch(e) { defIdx = parseInt(userId) % 5; }
            return 'https://cdn.discordapp.com/embed/avatars/' + defIdx + '.png';
        }

        // Init
        (async function init() {
            if (!token && !productId) {
                showState('st-404');
                return;
            }

            if (token) {
                try {
                    const resp = await fetch('/api/downloads/validate?token=' + encodeURIComponent(token) + '&peek=1');
                    const data = await resp.json();
                    if (data.success) {
                        downloadToken = token;
                        const expiresIn = data.expires_in || 0;
                        await loadProduct(data.product_id);
                        if (product) { await render(); if (expiresIn > 0) startCountdown(expiresIn); return; }
                    }
                    showError("This download link is invalid or has expired. Please generate a new one.");
                } catch (e) { showError("Unable to validate download token."); }
                return;
            }

            if (!productId) { showState('st-404'); return; }
            await loadProduct(productId);
            if (!product) { showError("Product not found."); return; }
            await render();
        })();

        async function loadProduct(pid) {
            try {
                const r = await fetch('/api/products?id=' + pid);
                if (r.ok) { const j = await r.json(); if (j && j.id) product = j; }
            } catch(e) {}
            if (!product) {
                const all = [...(window.presetsData || []), ...(window.pluginsData || [])];
                product = all.find(p => p.id === pid);
            }
        }

        async function render() {
            showState('st-main');
            document.title = (product.name || 'Download') + ' - Zyrex';

            const p = product;
            const ic = iconMap[p.category] || 'fa-folder';
            const cat = catLabels[p.category] || 'Others';
            const av = p.creator_avatar || '';
            const nick = p.creator_nickname || p.author_name || 'Zyrex Creator';
            const desc = p.description || p.desc || '';
            const password = p.password || '';
            const authorId = p.author_id || '';
            const uploaderName = p.uploader_name || '';

            let displayUploaderAv = await fetchDiscordAvatar(authorId);
            if (p.uploader_avatar && (p.uploader_avatar.includes('discordapp.com') || p.uploader_avatar.includes('discord.com'))) {
                displayUploaderAv = p.uploader_avatar;
            }

            let html = '';

            // Thumbnail
            html += '<div class="thumb-wrap">';
            if (p.thumbnail) {
                html += '<img src="' + p.thumbnail + '" alt="' + p.name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">';
            }
            html += '<i class="fas ' + ic + ' ph-icon" style="' + (p.thumbnail ? 'display:none' : '') + '"></i>';
            html += '<div class="thumb-badges"><span class="tbadge"><i class="fas ' + ic + '"></i> ' + cat + '</span><span class="tbadge free"><i class="fas fa-circle-check"></i> Free</span></div>';
            html += '</div>';

            // Title
            html += '<h1 class="product-title">' + p.name + '</h1>';
            html += '<div class="product-meta"><i class="fas ' + ic + '"></i> ' + cat + ' <span class="sep"></span> <i class="fas fa-download"></i> <span id="dlCount">0</span> downloads</div>';

            // Creator
            html += '<div class="creator-row">';
            html += av ? '<img src="' + av + '" alt="">' : '<div class="cav-fb"><i class="fas fa-user"></i></div>';
            html += '<strong>' + nick + '</strong>';
            if (p.creator_social_url) html += '<a href="' + p.creator_social_url + '" target="_blank"><i class="fas fa-external-link-alt"></i> Profile</a>';
            html += '</div>';

            // Uploader
            if (uploaderName) {
                html += '<div class="uploader-row">';
                html += displayUploaderAv ? '<img src="' + displayUploaderAv + '" alt="">' : '<div class="uav-fb"><i class="fab fa-discord"></i></div>';
                html += '<div><strong>' + uploaderName + '</strong><span>Community Uploader</span></div>';
                html += '</div>';
            }

            // Description
            if (desc) {
                html += '<div class="desc-block"><div class="desc-label"><i class="fas fa-align-left"></i> Description</div>' + desc.replace(/\n/g, '<br>') + '</div>';
            }

            // Files (exclude watermarks) - fetch from API if not in product data
            const watermarkNames = ['LEAKED BY ZYREX.txt', 'Visit for more resources!.url'];
            let fileList = p.files || [];
            
            if (fileList.length === 0 && (p.id || p.file_path)) {
                try {
                    const fp = p.file_path || ('production/' + p.id);
                    const filesResp = await fetch('/api/files/list-path?path=' + encodeURIComponent(fp));
                    const filesData = await filesResp.json();
                    if (filesData.success && filesData.files) {
                        fileList = filesData.files;
                    }
                } catch(e) {}
            }
            
            const realFiles = fileList.filter(function(f) { return !watermarkNames.includes(f.name); });
                
                if (realFiles.length > 0) {
                    html += '<div class="files-block"><div class="files-label"><div><i class="fas fa-folder-open"></i> Files in this pack (' + realFiles.length + ')</div><div class="files-label-right"><button class="select-all-btn" onclick="toggleSelectAll(this)">Select All</button></div></div>';
                    html += '<div class="files-scroll">';
                    realFiles.forEach(function(f, idx) {
                        const sz = f.size ? (f.size > 1048576 ? (f.size/1048576).toFixed(1)+' MB' : (f.size/1024).toFixed(1)+' KB') : '--';
                        const fi = f.name.endsWith('.mp4')||f.name.endsWith('.mov')?'fa-file-video':f.name.endsWith('.mp3')||f.name.endsWith('.wav')?'fa-file-audio':f.name.endsWith('.png')||f.name.endsWith('.jpg')||f.name.endsWith('.jpeg')?'fa-file-image':'fa-file-lines';
                        html += '<div class="file-item"><div class="fl"><input type="checkbox" class="file-cb" checked onchange="updateSelectedCount()" data-filename="' + f.name.replace(/"/g, '&quot;') + '"><i class="fas ' + fi + '"></i><span title="' + f.name + '">' + f.name + '</span></div><span class="fs">' + sz + '</span></div>';
                    });
                    html += '</div>'; // close files-scroll
                    html += '</div>'; // close files-block
                }

            // Password
            if (password) {
                html += '<div class="pw-block" onclick="var c=this.querySelector(\'code\');c.textContent=\'Copied!\';setTimeout(function(){c.textContent=\'' + password + '\'},1500)"><i class="fas fa-key"></i> Password: <code>' + password + '</code></div>';
            }

            // Download card
            if (productId || downloadToken) {
                html += '<div class="dl-card">';
                html += '<button class="dl-btn" id="dlBtn" onclick="triggerDownload()"><i class="fas fa-cloud-arrow-down"></i> Download Full Package (ZIP)</button>';
                html += '<div class="countdown-row" id="countdownRow"><i class="fas fa-hourglass-half"></i> <span>Expires in</span> <span class="timer" id="countdownTimer">--:--</span></div>';
                html += '</div>';
            }

            // Back link
            html += '<a href="https://zyrexediting.xyz/resources" class="back-link"><i class="fas fa-arrow-left"></i> Back to Resources</a>';

            document.getElementById('st-main').innerHTML = html;
            setTimeout(updateDownloadCount, 100);
            setTimeout(updateSelectedCount, 150);
        }

        // File selection helpers
        function toggleSelectAll(btn) {
            const cbs = document.querySelectorAll('.file-cb');
            const allChecked = Array.from(cbs).every(function(cb) { return cb.checked; });
            cbs.forEach(function(cb) { cb.checked = !allChecked; });
            btn.textContent = allChecked ? 'Select All' : 'Deselect All';
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const cbs = document.querySelectorAll('.file-cb');
            const checked = document.querySelectorAll('.file-cb:checked');
            const label = document.querySelector('.files-label div:first-child');
            if (label && cbs.length > 0) {
                const iconHtml = '<i class="fas fa-folder-open"></i> ';
                label.innerHTML = iconHtml + 'Files selected (' + checked.length + '/' + cbs.length + ')';
            }
            const selectAllBtn = document.querySelector('.select-all-btn');
            if (selectAllBtn && cbs.length > 0) {
                selectAllBtn.textContent = checked.length === cbs.length ? 'Deselect All' : 'Select All';
            }
            updateButtonText();
        }

        function updateButtonText() {
            const btn = document.getElementById('dlBtn');
            if (!btn) return;
            const allCbs = document.querySelectorAll('.file-cb');
            const checked = document.querySelectorAll('.file-cb:checked');
            const total = allCbs.length;
            const sel = checked.length;
            let icon = '<i class="fas fa-cloud-arrow-down"></i> ';
            if (total === 0 || sel === total) {
                btn.innerHTML = icon + 'Download Full Package (ZIP)';
            } else if (sel === 1) {
                btn.innerHTML = icon + 'Download Selected File';
            } else {
                btn.innerHTML = icon + 'Download Selected (' + sel + ' files)';
            }
        }

        // Download tracking
        function trackDownload() {
            if (!product || !product.id) return;
            var pid = product.id;
            // LocalStorage
            try {
                var key = 'zyrex_downloads';
                var downloads = JSON.parse(localStorage.getItem(key) || '{}');
                downloads[pid] = (downloads[pid] || 0) + 1;
                localStorage.setItem(key, JSON.stringify(downloads));
                updateDownloadCount();
            } catch(e) {}
            // Persistent API (cross-domain)
            try {
                fetch('/api/downloads/track', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({productId: pid})
                }).catch(function(){});
            } catch(e) {}
        }

        function updateDownloadCount() {
            const el = document.getElementById('dlCount');
            if (!el || !product) return;
            try {
                const downloads = JSON.parse(localStorage.getItem('zyrex_downloads') || '{}');
                el.textContent = downloads[product.id] || 0;
            } catch(e) {}
        }

        // Shared helper: read download count from localStorage or cross-domain cookie
        function getDownloadCount(productId) {
            // Try localStorage first
            try {
                const downloads = JSON.parse(localStorage.getItem('zyrex_downloads') || '{}');
                if (downloads[productId]) return downloads[productId];
            } catch(e) {}
            // Fallback: read from cross-domain cookie
            try {
                const match = document.cookie.match(new RegExp('(?:^|; )zyrex_dl_' + productId + '=([^;]*)'));
                if (match) return parseInt(match[1]) || 0;
            } catch(e) {}
            return 0;
        }

        // Progress UI
        function showProgress(text, detail) {
            document.getElementById('progText').textContent = text || 'Preparing download...';
            document.getElementById('progDetail').textContent = detail || '';
            document.getElementById('progBar').style.width = '0%';
            document.getElementById('progOverlay').classList.add('active');
        }
        function updateProgress(percent, detail) {
            document.getElementById('progBar').style.width = percent + '%';
            if (detail) document.getElementById('progDetail').textContent = detail;
        }
        function hideProgress() {
            document.getElementById('progOverlay').classList.remove('active');
        }
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/1048576).toFixed(1) + ' MB';
        }

        async function downloadWithProgress(url, filename) {
            showProgress('Connecting...', '');
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('Download failed: ' + resp.status);
                
                const contentLength = resp.headers.get('Content-Length');
                const total = contentLength ? parseInt(contentLength) : 0;
                let received = 0;
                const reader = resp.body.getReader();
                const chunks = [];
                
                updateProgress(0, total ? '0 / ' + formatSize(total) : 'Downloading...');
                
                while (true) {
                    const result = await reader.read();
                    if (result.done) break;
                    chunks.push(result.value);
                    received += result.value.length;
                    if (total > 0) {
                        updateProgress(Math.round((received / total) * 100), formatSize(received) + ' / ' + formatSize(total));
                    }
                    document.getElementById('progText').textContent = 'Downloading...';
                }
                
                updateProgress(100, 'Saving...');
                document.getElementById('progText').textContent = 'Saving to your computer...';
                
                const blob = new Blob(chunks);
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename || 'download.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                
                hideProgress();
                trackDownload();
            } catch(e) {
                hideProgress();
                alert('Download failed: ' + e.message);
            }
        }

        function getSelectedFiles() {
            const cbs = document.querySelectorAll('.file-cb');
            const allCbs = document.querySelectorAll('.file-cb');
            if (allCbs.length === 0) return '';
            const checked = document.querySelectorAll('.file-cb:checked');
            // Only filter if some are unchecked (otherwise send all)
            if (checked.length === allCbs.length) return '';
            return Array.from(checked).map(function(cb) { return encodeURIComponent(cb.dataset.filename); }).join(',');
        }

        async function triggerDownload() {
            const btn = document.getElementById('dlBtn');
            if (!btn) return;
            
            const selectedFiles = getSelectedFiles();
            const fileParam = selectedFiles ? '&files=' + selectedFiles : '';
            const titleParam = product ? '&title=' + encodeURIComponent(product.name) : '';
            
            if (downloadToken) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Downloading...';
                await downloadWithProgress('/api/downloads/download?token=' + downloadToken + fileParam + titleParam, (product ? product.name : 'download') + '.zip');
                btn.innerHTML = '<i class="fas fa-arrow-rotate-right"></i> Link Used';
                btn.disabled = true;
                return;
            }

            if (!productId) return;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating token...';
            
            try {
                const tokenResp = await fetch('/api/downloads/request-token/' + productId);
                if (!tokenResp.ok) {
                    const d = await tokenResp.json();
                    if (tokenResp.status === 401) {
                        window.location.href = '/api/login?redirect=' + encodeURIComponent(location.pathname + location.search);
                        return;
                    }
                    alert(d.error || 'Unable to acquire download ticket.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-cloud-arrow-down"></i> Download Full Package (ZIP)';
                    return;
                }
                const tokenData = await tokenResp.json();
                if (tokenData.success && tokenData.token) {
                    downloadToken = tokenData.token;
                    if (tokenData.expires_in) startCountdown(tokenData.expires_in);
                    btn.innerHTML = '<i class="fas fa-circle-check"></i> Starting download...';
                    await downloadWithProgress('/api/downloads/download?token=' + tokenData.token + fileParam + titleParam, (product ? product.name : 'download') + '.zip');
                    btn.innerHTML = '<i class="fas fa-arrow-rotate-right"></i> Link Used';
                    btn.disabled = true;
                } else {
                    alert('Ticket generation failed.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-cloud-arrow-down"></i> Download Full Package (ZIP)';
                }
            } catch (e) {
                console.error('Download error:', e);
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-arrow-down"></i> Download Full Package (ZIP)';
            }
        }

        async function triggerFileDownload(filePath, btn) {
            if (!productId) return;
            const origHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const tokenResp = await fetch('/api/downloads/request-token/' + productId);
                if (!tokenResp.ok) {
                    const d = await tokenResp.json();
                    alert(d.error || 'Unable to acquire download ticket.');
                    btn.disabled = false;
                    btn.innerHTML = origHtml;
                    return;
                }
                const tokenData = await tokenResp.json();
                if (tokenData.success && tokenData.token) {
                    trackDownload();
                    window.location.href = '/api/downloads/download?token=' + tokenData.token + '&file=' + encodeURIComponent(filePath);
                    setTimeout(function() { btn.disabled = false; btn.innerHTML = origHtml; }, 3000);
                } else {
                    alert('Ticket generation failed.');
                    btn.disabled = false;
                    btn.innerHTML = origHtml;
                }
            } catch (e) {
                console.error('File download error:', e);
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = origHtml;
            }
        }
    </script>
