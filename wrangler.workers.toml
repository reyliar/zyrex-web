name = "zyrex-api"
main = "workers/api.js"
compatibility_date = "2024-12-01"

# Environment variables
[vars]
DISCORD_CLIENT_ID = "1519456130290417776"
DISCORD_REDIRECT_URI = "https://zyrexediting.xyz/api/auth/callback"
GUILD_ID = "1518954946110685184"
UPLOAD_ROLE_ID = "1519624224476762122"

# Secrets (set via wrangler secret put):
# DISCORD_CLIENT_SECRET
# DISCORD_BOT_TOKEN

# R2 Bucket bindings
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "zyrexediting"

[[r2_buckets]]
binding = "STORAGE_PROD"
bucket_name = "zyrexediting-staging"

# Route - handles /api/* on the custom domain
# routes = [{ pattern = "zyrexediting.xyz/api/*", zone_id = "your-zone-id" }]
