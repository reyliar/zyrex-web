name = "zyrex-api"
main = "workers/api.js"
compatibility_date = "2024-12-01"

# Environment variables
[vars]
DISCORD_CLIENT_ID = "1519456130290417776"
DISCORD_REDIRECT_URI = "https://zyrexediting.xyz/api/auth/callback"
GUILD_ID = "1518954946110685184"
UPLOAD_ROLE_ID = "1519624224476762122"

# Secrets (set via wrangler secret put):
# DISCORD_CLIENT_SECRET
# DISCORD_BOT_TOKEN
# SHRINKEARN_API_TOKEN

# R2 Bucket bindings
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "zyrexediting"

[[r2_buckets]]
binding = "STORAGE_PROD"
bucket_name = "zyrexediting-staging"

# === Routes ===
# Main-domain API/resource traffic and the download subdomain enter through
# zyrex-site-gate and reach this Worker over the API service binding.
# The thumbnail CDN remains directly routed here.

[[routes]]
pattern = "thumbnail.zyrexediting.xyz/*"
zone_id = "1844c05896c2b3897c61d37dc08b71e8"
